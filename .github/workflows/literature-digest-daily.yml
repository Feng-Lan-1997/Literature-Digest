name: Literature Digest Daily WeCom Push

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run immediately, ignoring the daily time check"
        required: false
        default: false
        type: boolean

jobs:
  daily-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Restore pushed history
        uses: actions/cache/restore@v5
        with:
          path: .literature-digest-state
          key: literature-digest-state-${{ github.run_id }}
          restore-keys: |
            literature-digest-state-

      - name: Search and push literature
        id: push
        run: node literature-digest-cloud/daily-push.mjs
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          RESEARCH_QUERY: ${{ vars.RESEARCH_QUERY || secrets.RESEARCH_QUERY }}
          REQUIRED_KEYWORD_GROUPS: ${{ vars.REQUIRED_KEYWORD_GROUPS }}
          STRICT_REQUIRED_KEYWORDS: ${{ vars.STRICT_REQUIRED_KEYWORDS || 'true' }}
          PRIORITY_JOURNALS: ${{ vars.PRIORITY_JOURNALS }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          IMPACT_FACTOR_TABLE: ${{ vars.IMPACT_FACTOR_TABLE || secrets.IMPACT_FACTOR_TABLE }}
          PUSH_TIME: ${{ vars.PUSH_TIME || '08:30' }}
          TIME_ZONE: ${{ vars.TIME_ZONE || 'America/New_York' }}
          LOOKBACK_DAYS: ${{ vars.LOOKBACK_DAYS || '90' }}
          MAX_ITEMS: ${{ vars.MAX_ITEMS || '3' }}
          EXCLUDE_PUSHED: ${{ vars.EXCLUDE_PUSHED || 'true' }}
          AUTO_JOURNAL_METRICS: ${{ vars.AUTO_JOURNAL_METRICS || 'true' }}
          FORCE_PUSH: ${{ github.event_name == 'workflow_dispatch' && inputs.force && 'true' || 'false' }}

      - name: Save pus
